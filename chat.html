<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whisper Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Whisper" />
  <meta name="description" content="Secure private chat room">

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="chat-header">
    <div class="header-left">
      <span id="roomName"># room</span>
      <span id="typingIndicator"></span>
    </div>
    <div class="header-actions">
      <button id="shareBtn" class="header-btn" aria-label="Share room link" title="Share room link">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
      </button>
      <button id="leaveBtn" class="header-btn leave-btn" aria-label="Leave room" title="Leave room">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </header>
  
  <!-- SPLASH SCREEN -->
  <div id="splash" class="splash-screen">
    <div class="splash-content">
      <div class="splash-logo">💬</div>
      <h1>Whisper</h1>
      <div class="splash-loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      <p>Connecting to room...</p>
    </div>
  </div>

  <!-- MESSAGES -->
  <main id="messages"></main>

  <!-- INPUT -->
  <footer class="chat-input">
    <input
      id="messageInput"
      type="text"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button id="sendBtn" aria-label="Send message">➤</button>
  </footer>

  <script>
    // Canonical URL enforcement
    // Prevent /chat.html usage
    if (location.pathname.endsWith(".html")) {
      location.replace("/chat");
    }
  </script>

  <script src="/js/chat.js"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered:', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
