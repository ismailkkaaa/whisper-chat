<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whisper Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Whisper" />
  <meta name="description" content="Secure private chat room">

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/chat.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="chat-header">
    <span id="roomName"># room</span>
    <span id="typingIndicator"></span>
  </header>

  <!-- MESSAGES -->
  <main id="messages"></main>

  <!-- INPUT -->
  <footer class="chat-input">
    <input
      id="messageInput"
      type="text"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button id="sendBtn" aria-label="Send message">➤</button>
  </footer>

  <script>
    // Canonical URL enforcement
    // Prevent /chat.html usage
    if (location.pathname.endsWith(".html")) {
      location.replace("/chat");
    }
  </script>

  <script src="/js/chat.js"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered:', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
