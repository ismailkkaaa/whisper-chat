<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Whisper - Private Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#405de6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Whisper">
  <meta name="description" content="Private, secure, and real-time messaging platform">

  <!-- Open Graph / Social Media Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Whisper Chat - Private Real-time Messaging">
  <meta property="og:description" content="Private, secure, and real-time messaging platform inspired by Instagram">
  <meta property="og:image" content="https://whisper-chat-6sy.pages.dev/public/preview.png">
  <meta property="og:url" content="https://whisper-chat-6sy.pages.dev/">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Whisper Chat - Private Real-time Messaging">
  <meta name="twitter:description" content="Private, secure, and real-time messaging platform inspired by Instagram">
  <meta name="twitter:image" content="https://whisper-chat-6sy.pages.dev/public/preview.png">

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/public/favicon.ico">
  <meta name="theme-color" content="#405de6">

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body>

<div class="landing-container">
  <main class="card">
    <h1>💬 Whisper</h1>
    <p class="tagline">Private conversations, real-time connections</p>

    <div class="form-group">
      <input id="username" placeholder="Your name" autocomplete="name">
    </div>
    
    <div class="form-group">
      <input id="room" placeholder="Room code or create new" autocomplete="off">
    </div>

    <div class="button-group">
      <button id="join">Start Chatting</button>
    </div>

    <div class="social-proof">
      <span>🔒 End-to-end encrypted</span>
      <span>⚡ Real-time</span>
    </div>

    <div class="divider">
      <span>Created with ❤️ by</span>
    </div>

    <footer>
      <a href="https://github.com/ismailkkaaa" target="_blank" rel="noopener">ismailkkaaa</a> ·
      <a href="https://github.com/chriz-3656" target="_blank" rel="noopener">chriz-3656</a>
    </footer>
  </main>
</div>

<script src="/js/landing.js"></script>
<script>
  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered:', reg.scope))
        .catch(err => console.log('Service Worker registration failed:', err));
    });
  }
</script>
</body>
</html>
